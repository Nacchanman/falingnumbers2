<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>フルーツ大収穫祭</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Yomogi&display=swap');

    :root {
      --sky-top: #bfe9ff;
      --sky-bottom: #e8fff3;
      --panel: rgba(12, 30, 20, 0.70);
      --line: rgba(255,255,255,0.16);
      --text: #fffef8;
      --sub: #e8f6ea;
      --good: #6ff1a1;
      --bad: #ff8695;
      --warn: #ffe17c;
      --shadow: 0 12px 30px rgba(0,0,0,.22);
      --pink: #ff8db2;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: 'Yomogi', system-ui, sans-serif;
      touch-action: manipulation;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    #gameWrap {
      position: relative;
      width: min(100vw, 520px);
      height: 100vh;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,0) 28%),
        linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      border-left: 1px solid rgba(255,255,255,0.10);
      border-right: 1px solid rgba(255,255,255,0.10);
      --safe-top: max(10px, env(safe-area-inset-top));
    }

    #gameCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .gameHeader {
      position: absolute;
      top: calc(var(--safe-top) + 2px);
      left: 0;
      right: 0;
      text-align: center;
      z-index: 6;
      pointer-events: none;
    }

    .gameTitle {
      display: inline-block;
      padding: 4px 16px 6px;
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 400;
      letter-spacing: .03em;
      color: #fff7fb;
      text-shadow:
        0 2px 0 rgba(120, 52, 81, .55),
        0 6px 18px rgba(255,255,255,.25),
        0 4px 12px rgba(0,0,0,.18);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,170,207,.88), rgba(255,126,177,.72));
      border: 1px solid rgba(255,255,255,.38);
      box-shadow: 0 10px 20px rgba(255,141,178,.24);
    }

    .topUi {
      position: absolute;
      left: 8px;
      right: 8px;
      top: calc(var(--safe-top) + 54px);
      z-index: 5;
      display: grid;
      gap: 6px;
      pointer-events: none;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 2px;
      padding: 6px 8px;
      min-height: 42px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }

    .label {
      font-size: 10px;
      color: var(--sub);
      line-height: 1.05;
      white-space: nowrap;
    }

    .value {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
    }

    .questionBox {
      padding: 8px 10px;
      min-height: 70px;
    }

    .questionTop {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .questionMain {
      flex: 1;
      min-width: 0;
    }

    .questionLabel {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 3px;
    }

    .question {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 700;
      line-height: 1.08;
      margin-bottom: 2px;
      word-break: break-word;
    }

    .hint {
      font-size: 10px;
      color: var(--sub);
      line-height: 1.25;
    }

    .modeTag {
      display: inline-flex;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.16);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .controlsRow {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      pointer-events: none;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: auto;
    }

    button {
      border: 0;
      color: var(--text);
      background: rgba(255,255,255,0.10);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px 12px;
      font-weight: 700;
      min-height: 38px;
      box-shadow: var(--shadow);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    button:active { transform: translateY(1px) scale(.99); }

    .toast {
      position: absolute;
      left: 50%;
      top: 180px;
      transform: translateX(-50%);
      z-index: 7;
      min-width: 120px;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      background: rgba(19, 52, 28, .80);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: var(--shadow);
      max-width: calc(100vw - 40px);
      font-size: 12px;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.good { color: var(--good); }
    .toast.bad { color: var(--bad); }
    .toast.warn { color: var(--warn); }

    .bossBanner {
      position: absolute;
      left: 50%;
      top: 218px;
      transform: translateX(-50%);
      z-index: 7;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 225, 124, 0.18);
      color: #fff7cf;
      font-weight: 700;
      border: 1px solid rgba(255, 225, 124, 0.28);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      max-width: calc(100vw - 40px);
      white-space: nowrap;
      font-size: 12px;
    }

    .bossBanner.show { opacity: 1; }

    .centerOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 8;
      background: linear-gradient(180deg, rgba(19,40,23,.14), rgba(19,40,23,.44));
    }

    .card {
      width: min(94vw, 430px);
      padding: 18px 16px;
      text-align: center;
      background: rgba(15, 38, 23, .80);
      border-radius: 24px;
    }

    .title {
      margin: 0 0 12px;
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 400;
      color: #fff7fb;
      text-shadow:
        0 2px 0 rgba(120, 52, 81, .55),
        0 8px 20px rgba(255,255,255,.15),
        0 6px 14px rgba(0,0,0,.18);
    }

    .big {
      width: 100%;
      padding: 15px 16px;
      font-size: 18px;
      background: linear-gradient(180deg, rgba(255,182,210,.88), rgba(255,132,182,.74));
      color: #fff;
      border-color: rgba(255,255,255,.28);
    }

    .modeChooser {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0 0 14px;
      text-align: left;
    }

    .modeCard {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      user-select: none;
    }

    .modeCard.active {
      outline: 2px solid rgba(255,190,214,.35);
      background: rgba(255,255,255,0.10);
    }

    .modeCardTitle {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modeCardDesc {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.4;
    }

    .resultScore {
      font-size: 20px;
      color: #fff7d1;
      margin-bottom: 8px;
    }

    .resultRank {
      font-size: clamp(22px, 6vw, 30px);
      color: #fff5a8;
      margin-bottom: 10px;
      text-shadow: 0 2px 0 rgba(98,75,18,.5);
    }

    .resultHint {
      font-size: 12px;
      color: var(--sub);
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .resultIllustWrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 10px;
      border-radius: 20px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      transition: none;
    }

    #resultCanvas {
      position: static;
      inset: auto;
      width: 100%;
      height: 100%;
      display: block;
    }

    .resultIllustWrap:active {
      transform: scale(.98);
    }

    .hidden { display: none; }

    @media (max-width: 480px) {
      .question { font-size: clamp(17px, 5.2vw, 24px); }
      .modeChooser { grid-template-columns: 1fr; }
      .gameTitle { font-size: clamp(20px, 5.8vw, 30px); }
      .resultIllustWrap { width: 154px; height: 154px; }
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <div class="gameHeader">
      <div class="gameTitle">フルーツ大収穫祭</div>
    </div>

    <div class="topUi" id="topUi">
      <div class="panel stats">
        <div class="stat"><div class="label">スコア</div><div class="value" id="score">0</div></div>
        <div class="stat"><div class="label">連続正解</div><div class="value" id="combo">0</div></div>
        <div class="stat"><div class="label">ライフ</div><div class="value" id="lives">3</div></div>
        <div class="stat"><div class="label">残り時間</div><div class="value" id="timer">--</div></div>
      </div>

      <div class="panel questionBox">
        <div class="questionTop">
          <div class="questionMain">
            <div class="questionLabel">この答えのフルーツをタップ</div>
            <div class="question" id="questionText">2 + 3</div>
            <div class="hint" id="hintText">見た目では正解は分からない。計算して見抜こう。</div>
          </div>
          <div class="modeTag" id="modeTag">エンドレス</div>
        </div>
      </div>

      <div class="controlsRow">
        <div class="controls">
          <button id="pauseBtn" aria-label="一時停止">一時停止</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="bossBanner" id="bossBanner">ボス問題！</div>

    <div class="centerOverlay" id="startOverlay">
      <div class="panel card">
        <h1 class="title">フルーツ大収穫祭</h1>
        <div class="modeChooser">
          <div class="modeCard active" data-mode="endless">
            <div class="modeCardTitle">エンドレス</div>
            <div class="modeCardDesc">ライフがなくなるまで遊ぶ</div>
          </div>
          <div class="modeCard" data-mode="timeattack">
            <div class="modeCardTitle">タイムアタック</div>
            <div class="modeCardDesc">60秒でどこまで取れるか</div>
          </div>
        </div>
        <button class="big" id="startBtn">スタート</button>
      </div>
    </div>

    <div class="centerOverlay hidden" id="gameOverOverlay">
      <div class="panel card">
        <h2 class="title">リザルト</h2>
        <div class="resultScore" id="resultScore">スコア 0</div>
        <div class="resultRank" id="resultRank">見習い農家</div>
        <div class="resultIllustWrap" id="resultIllustWrap" aria-label="ランクイラストをタップ">
          <canvas id="resultCanvas" width="120" height="120" aria-label="ランクイラスト"></canvas>
        </div>
        <div class="resultHint">イラストをタップすると動くよ！</div>
        <button class="big" id="restartBtn">もう一度</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('gameWrap');
    const topUiEl = document.getElementById('topUi');

    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const livesEl = document.getElementById('lives');
    const timerEl = document.getElementById('timer');
    const questionTextEl = document.getElementById('questionText');
    const hintTextEl = document.getElementById('hintText');
    const toastEl = document.getElementById('toast');
    const bossBannerEl = document.getElementById('bossBanner');
    const modeTagEl = document.getElementById('modeTag');

    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const resultScoreEl = document.getElementById('resultScore');
    const resultRankEl = document.getElementById('resultRank');
    const resultIllustWrap = document.getElementById('resultIllustWrap');
    const resultCanvas = document.getElementById('resultCanvas');
    const rctx = resultCanvas.getContext('2d');

    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const modeCards = [...document.querySelectorAll('.modeCard')];

    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let width = 0;
    let height = 0;
    let playableTop = 190;
    let playableBottom = 560;
    let laneCenters = [];

    let gameState = 'ready';
    let mode = 'endless';
    let score = 0;
    let combo = 0;
    let lives = 3;
    let timeLeft = 60;

    let items = [];
    let particles = [];
    let slices = [];
    let currentQuestion = null;
    let spawnTimer = 0;
    let lastTs = 0;
    let difficultyTime = 0;
    let bossActive = false;
    let nextBossAt = 7;
    let shakeTime = 0;

    let resultAnim = {
      rankIndex: 0,
      bounce: 0,
      spin: 0,
      sparkle: 0,
      pulse: 0,
      lastTap: 0,
    };

    const ranks = [
      { min: 0, name: '見習い農家', art: 'sprout', color: '#8fd96a' },
      { min: 40, name: 'たねまき名人', art: 'seedbag', color: '#f2c96c' },
      { min: 90, name: '畑のおともだち', art: 'chick', color: '#ffd86d' },
      { min: 150, name: 'もぎたてハンター', art: 'basket', color: '#ffb36d' },
      { min: 230, name: 'くだもの番長', art: 'applecat', color: '#ff8b8b' },
      { min: 330, name: '森の収穫長', art: 'bear', color: '#c49bff' },
      { min: 460, name: 'にこにこ果樹園主', art: 'tree', color: '#79d892' },
      { min: 620, name: 'スイーツ収穫姫', art: 'cake', color: '#ff9ec3' },
      { min: 820, name: 'レインボー農園王', art: 'crownfruit', color: '#8cc9ff' },
      { min: 1100, name: 'フルーツキング', art: 'king', color: '#ffe17c' },
    ];

    const config = {
      baseSpawnInterval: 1.05,
      minSpawnInterval: 0.48,
      baseSpeed: 55,
      speedGainPerSec: 1.2,
      comboSpeedGain: 0.8,
      fruitSizeMin: 54,
      fruitSizeMax: 84,
      maxVisible: 12,
      laneCount: 4,
      horizontalPadding: 10,
      overlapPadding: 10,
      spawnTries: 40,
      timeAttackDuration: 60,
    };

    const fruitThemes = [
      { type: 'apple', body1: '#ff6b6b', body2: '#d73a49', leaf: '#4caf50', stem: '#6d4c41' },
      { type: 'orange', body1: '#ffb347', body2: '#f57c00', leaf: '#5bbf63', stem: '#6d4c41' },
      { type: 'pear', body1: '#c7f36b', body2: '#84b735', leaf: '#4aa65a', stem: '#6d4c41' },
      { type: 'plum', body1: '#b388ff', body2: '#6a3fb1', leaf: '#70c26f', stem: '#6d4c41' },
      { type: 'lemon', body1: '#ffe66d', body2: '#d9bf35', leaf: '#62b55d', stem: '#6d4c41' },
      { type: 'peach', body1: '#ffb08a', body2: '#ef6c57', leaf: '#5cb85c', stem: '#6d4c41' },
      { type: 'berry', body1: '#69a7ff', body2: '#3f65d6', leaf: '#63bd72', stem: '#6d4c41' },
    ];

    let audioCtx = null;
    let masterGain = null;
    let bgmGain = null;
    let sfxGain = null;
    let bgmNodes = [];
    let bgmStarted = false;
    let bgmTimer = null;
    let bgmMode = 'normal';
    let bgmScheduleToken = 0;

    function resize() {
      const rect = wrap.getBoundingClientRect();
      width = Math.floor(rect.width);
      height = Math.floor(rect.height);
      dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      recalcLayout();
    }

    function recalcLayout() {
      const topUiRect = topUiEl.getBoundingClientRect();
      const wrapRect = wrap.getBoundingClientRect();
      const uiBottom = topUiRect.bottom - wrapRect.top;
      playableTop = Math.max(150, Math.ceil(uiBottom + 10));
      playableBottom = height - 8;
      if (playableBottom < playableTop + 180) playableBottom = playableTop + 180;
      toastEl.style.top = `${playableTop - 14}px`;
      bossBannerEl.style.top = `${playableTop + 20}px`;

      const laneCount = width < 360 ? 3 : config.laneCount;
      const usableWidth = width - config.horizontalPadding * 2;
      const laneWidth = usableWidth / laneCount;
      laneCenters = [];
      for (let i = 0; i < laneCount; i++) laneCenters.push(config.horizontalPadding + laneWidth * (i + 0.5));
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function distanceSq(ax, ay, bx, by) { const dx = ax - bx; const dy = ay - by; return dx * dx + dy * dy; }

    function getRankByScore(v) {
      let current = ranks[0];
      let idx = 0;
      for (let i = 0; i < ranks.length; i++) {
        if (v >= ranks[i].min) {
          current = ranks[i];
          idx = i;
        }
      }
      return { ...current, index: idx };
    }

    function updateHud() {
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      livesEl.textContent = lives;
      timerEl.textContent = mode === 'timeattack' ? Math.max(0, Math.ceil(timeLeft)) : '--';
      modeTagEl.textContent = mode === 'timeattack' ? 'タイムアタック' : 'エンドレス';
    }

    function showToast(text, kind = 'good', duration = 450) {
      toastEl.textContent = text;
      toastEl.className = `toast show ${kind}`;
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => { toastEl.className = 'toast'; }, duration);
    }

    function showBossBanner() {
      bossBannerEl.classList.add('show');
      clearTimeout(showBossBanner._timer);
      showBossBanner._timer = setTimeout(() => bossBannerEl.classList.remove('show'), 1200);
    }

    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioCtx = new AC();
        masterGain = audioCtx.createGain();
        bgmGain = audioCtx.createGain();
        sfxGain = audioCtx.createGain();
        masterGain.gain.value = 0.7;
        bgmGain.gain.value = 0.06;
        sfxGain.gain.value = 0.95;
        bgmGain.connect(masterGain);
        sfxGain.connect(masterGain);
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function stopBgm() {
      bgmScheduleToken++;
      if (bgmTimer) clearTimeout(bgmTimer);
      bgmTimer = null;
      bgmNodes.forEach(node => { try { node.stop(); } catch (_) {} });
      bgmNodes = [];
      bgmStarted = false;
    }

    function scheduleBgmLoop(modeName = 'normal') {
      const ac = ensureAudio();
      if (!ac || !bgmGain) return;
      stopBgm();
      bgmStarted = true;
      bgmMode = modeName;
      const scheduleToken = ++bgmScheduleToken;
      const now = ac.currentTime + 0.03;
      const beat = modeName === 'boss' ? 0.25 : 0.31;
      const bar = beat * 4;
      const totalBars = 8;
      const loopLength = bar * totalBars;
      const bassLine = modeName === 'boss' ? [98, 98, 123.47, 123.47, 164.81, 164.81, 146.83, 146.83] : [110, 110, 146.83, 146.83, 164.81, 164.81, 130.81, 130.81];
      const chordRoots = modeName === 'boss' ? [196, 196, 246.94, 246.94, 329.63, 329.63, 293.66, 293.66] : [220, 220, 293.66, 293.66, 329.63, 329.63, 261.63, 261.63];
      const leadPattern = modeName === 'boss' ? [783.99, 880.0, 987.77, 880.0, 783.99, 1046.5, 987.77, 880.0] : [659.25, 587.33, 523.25, 587.33, 659.25, 783.99, 698.46, 587.33];

      function addTone(freq, start, dur, type, gainValue, targetGain = bgmGain, slideTo = null, detune = 0) {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = type;
        osc.detune.value = detune;
        osc.frequency.setValueAtTime(freq, start);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, start + dur);
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(gainValue, start + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
        osc.connect(g); g.connect(targetGain); osc.start(start); osc.stop(start + dur + 0.03); bgmNodes.push(osc);
      }

      for (let barIndex = 0; barIndex < totalBars; barIndex++) {
        const barStart = now + bar * barIndex;
        const bassFreq = bassLine[barIndex];
        const chordRoot = chordRoots[barIndex];
        const leadFreq = leadPattern[barIndex];
        addTone(bassFreq, barStart, beat * 1.6, 'square', modeName === 'boss' ? 0.09 : 0.075);
        addTone(bassFreq * 2, barStart + beat * 0.08, beat * 0.32, 'triangle', 0.018);
        addTone(bassFreq, barStart + beat * 2, beat * 1.55, 'square', modeName === 'boss' ? 0.085 : 0.07);
        addTone(chordRoot, barStart, bar * 0.96, 'triangle', modeName === 'boss' ? 0.018 : 0.014, bgmGain, null, -4);
        addTone(chordRoot * 1.25, barStart, bar * 0.96, 'triangle', modeName === 'boss' ? 0.015 : 0.012, bgmGain, null, 3);
        addTone(chordRoot * 1.5, barStart, bar * 0.96, 'sine', 0.010);
        addTone(leadFreq, barStart + beat * 0.0, beat * 0.28, 'square', modeName === 'boss' ? 0.024 : 0.018);
        addTone(leadFreq * 1.122, barStart + beat * 0.5, beat * 0.22, 'square', modeName === 'boss' ? 0.020 : 0.014);
        addTone(leadFreq * 0.89, barStart + beat * 1.0, beat * 0.28, 'square', modeName === 'boss' ? 0.023 : 0.017);
        addTone(leadFreq * 1.122, barStart + beat * 1.5, beat * 0.22, 'square', modeName === 'boss' ? 0.019 : 0.013);
        addTone(leadFreq * 1.335, barStart + beat * 2.0, beat * 0.28, 'square', modeName === 'boss' ? 0.025 : 0.018);
        addTone(leadFreq * 1.5, barStart + beat * 2.5, beat * 0.22, 'square', modeName === 'boss' ? 0.020 : 0.014);
        addTone(leadFreq * 1.335, barStart + beat * 3.0, beat * 0.48, 'square', modeName === 'boss' ? 0.022 : 0.016, bgmGain, leadFreq * 1.0);
        for (let s = 0; s < 8; s++) addTone(modeName === 'boss' ? 1320 : 1046.5, barStart + beat * 0.5 * s, 0.026, 'square', modeName === 'boss' ? 0.006 : 0.004);
      }

      bgmTimer = setTimeout(() => {
        if (scheduleToken !== bgmScheduleToken) return;
        if (gameState === 'running' || gameState === 'paused') scheduleBgmLoop(bgmMode);
      }, Math.max(100, (loopLength - 0.12) * 1000));
    }

    function startBgmIfNeeded(forceMode = null) {
      const ac = ensureAudio();
      if (!ac) return;
      const desiredMode = forceMode || (currentQuestion && currentQuestion.boss ? 'boss' : 'normal');
      if (!bgmStarted || bgmMode !== desiredMode) scheduleBgmLoop(desiredMode);
    }

    function beep(freq, duration, type = 'sine', gain = 0.03, slideTo = null) {
      const ac = ensureAudio();
      if (!ac || !sfxGain) return;
      const now = ac.currentTime;
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      if (slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), now + duration);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(gain, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(g); g.connect(sfxGain); osc.start(now); osc.stop(now + duration + 0.02);
    }

    const soundCorrect = () => { beep(560, 0.08, 'triangle', 0.035, 760); setTimeout(() => beep(840, 0.09, 'triangle', 0.03, 980), 45); };
    const soundWrong = () => beep(240, 0.12, 'sawtooth', 0.03, 160);
    const soundBoss = () => { beep(330, 0.12, 'square', 0.03, 420); setTimeout(() => beep(520, 0.15, 'square', 0.03, 650), 80); };
    const soundSlice = () => beep(700, 0.05, 'triangle', 0.018, 980);
    const soundResultTap = () => { beep(520, 0.06, 'triangle', 0.025, 680); setTimeout(() => beep(760, 0.08, 'triangle', 0.02, 960), 35); };

    function setMode(nextMode) {
      mode = nextMode;
      modeCards.forEach(card => card.classList.toggle('active', card.dataset.mode === nextMode));
      updateHud();
    }

    function generateQuestion(forceBoss = false) {
      const boss = forceBoss;
      let type, a, b, c, answer, text;
      if (boss) {
        type = pick(['mix1', 'mix2', 'mix3']);
        if (type === 'mix1') { a = randInt(2, 12); b = randInt(2, 9); c = randInt(1, 18); answer = a * b + c; text = `${a} × ${b} + ${c}`; }
        else if (type === 'mix2') { b = randInt(2, 10); c = randInt(2, 10); answer = randInt(6, 24); a = answer + b * c; text = `${a} − ${b} × ${c}`; }
        else { a = randInt(2, 12); b = randInt(2, 6); c = randInt(2, 12); answer = a * (b + c); text = `${a} × (${b} + ${c})`; }
      } else {
        type = pick(['+', '-', '×', '÷']);
        if (type === '+') { a = randInt(1, 20); b = randInt(1, 20); answer = a + b; text = `${a} + ${b}`; }
        else if (type === '-') { a = randInt(5, 30); b = randInt(1, a - 1); answer = a - b; text = `${a} − ${b}`; }
        else if (type === '×') { a = randInt(2, 12); b = randInt(2, 12); answer = a * b; text = `${a} × ${b}`; }
        else { b = randInt(2, 12); answer = randInt(2, 12); a = b * answer; text = `${a} ÷ ${b}`; }
      }
      bossActive = boss;
      currentQuestion = { text, answer, boss };
      questionTextEl.textContent = text;
      hintTextEl.textContent = boss ? 'ボス問題。式が重いぶん高得点。' : '見た目では正解は分からない。計算して見抜こう。';
      if (boss) { showBossBanner(); showToast('ボス問題！', 'warn', 700); soundBoss(); startBgmIfNeeded('boss'); }
      else startBgmIfNeeded('normal');
    }

    function randomWrongAnswer(correct) {
      let n, attempts = 0;
      do {
        const spread = correct < 10 ? 8 : correct < 30 ? 14 : correct < 80 ? 22 : 30;
        n = correct + randInt(-spread, spread);
        if (Math.random() < 0.2) n = randInt(0, 180);
        attempts++;
      } while ((n === correct || n < 0 || n > 180) && attempts < 40);
      if (n === correct || n < 0) n = correct + randInt(1, 4);
      return n;
    }

    function createFruitTheme() { return { ...pick(fruitThemes) }; }

    function findSpawnPosition(radius) {
      const lanePool = [...laneCenters];
      for (let i = lanePool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [lanePool[i], lanePool[j]] = [lanePool[j], lanePool[i]];
      }
      const upperSpawnBase = playableTop - radius - rand(20, 60);
      for (const laneX of lanePool) {
        for (let t = 0; t < config.spawnTries; t++) {
          const x = clamp(laneX + rand(-12, 12), config.horizontalPadding + radius, width - config.horizontalPadding - radius);
          const y = upperSpawnBase - t * rand(4, 10);
          let blocked = false;
          for (const item of items) {
            if (!item.alive) continue;
            const minGap = item.r + radius + config.overlapPadding;
            const sameBand = Math.abs(item.x - x) < minGap * 0.92;
            const nearSpawnBand = item.y < playableTop + radius * 3.2;
            if (sameBand && nearSpawnBand && distanceSq(item.x, item.y, x, y) < minGap * minGap) { blocked = true; break; }
          }
          if (!blocked) return { x, y };
        }
      }
      return { x: clamp(pick(laneCenters) + rand(-14, 14), config.horizontalPadding + radius, width - config.horizontalPadding - radius), y: playableTop - radius - rand(50, 100) };
    }

    function createItem(value, isCorrect = false, options = {}) {
      const size = rand(config.fruitSizeMin, config.fruitSizeMax) * (options.big ? 1.18 : 1);
      const radius = size / 2;
      const spawn = findSpawnPosition(radius);
      const comboBoost = combo * config.comboSpeedGain;
      const speed = config.baseSpeed + difficultyTime * config.speedGainPerSec + comboBoost + rand(-8, 24);
      const drift = rand(-7, 7);
      items.push({
        x: spawn.x, y: spawn.y, r: radius, size, value, isCorrect, speed, drift,
        rotation: rand(-0.14, 0.14), spin: rand(-0.25, 0.25), pulse: rand(0, Math.PI * 2),
        shapeSeed: rand(0.88, 1.14), theme: createFruitTheme(), alive: true, big: !!options.big,
      });
    }

    function separateOverlaps() {
      for (let pass = 0; pass < 2; pass++) {
        for (let i = 0; i < items.length; i++) {
          const a = items[i]; if (!a.alive) continue;
          for (let j = i + 1; j < items.length; j++) {
            const b = items[j]; if (!b.alive) continue;
            const minDist = a.r + b.r + 6;
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
            if (dist < minDist) {
              const push = (minDist - dist) * 0.5;
              const nx = dx / dist, ny = dy / dist;
              a.x -= nx * push; b.x += nx * push;
              if (a.y < playableTop + 120) a.y -= ny * push * 0.2;
              if (b.y < playableTop + 120) b.y += ny * push * 0.2;
              a.x = clamp(a.x, a.r, width - a.r);
              b.x = clamp(b.x, b.r, width - b.r);
            }
          }
        }
      }
    }

    function clearCorrectFlags() { items.forEach(i => i.isCorrect = false); }
    function ensureOnlyOneCorrect(answer) {
      const alive = items.filter(i => i.alive);
      const matching = alive.filter(i => i.value === answer);
      if (matching.length === 0) createItem(answer, true, { big: bossActive });
      else { clearCorrectFlags(); pick(matching).isCorrect = true; }
    }

    function spawnWave() {
      if (!currentQuestion) generateQuestion();
      const visibleCorrect = items.some(i => i.isCorrect && i.alive);
      const baseCount = bossActive ? randInt(1, 2) : randInt(1, 2 + Math.floor(difficultyTime / 28));
      if (!visibleCorrect) createItem(currentQuestion.answer, true, { big: bossActive });
      for (let i = 0; i < baseCount; i++) createItem(randomWrongAnswer(currentQuestion.answer), false);
      ensureOnlyOneCorrect(currentQuestion.answer);
      separateOverlaps();
      if (items.length > config.maxVisible) items.splice(0, items.length - config.maxVisible);
    }

    function burst(x, y, good, count = 14) {
      for (let i = 0; i < count; i++) particles.push({ x, y, vx: rand(-120, 120), vy: rand(-150, 60), life: rand(0.28, 0.64), t: 0, size: rand(3, 7), good });
    }

    function createSlicePieces(item) {
      const left = { ...item }, right = { ...item };
      slices.push({ ...left, half: 'left', vx: -80 - rand(0, 40), vy: -100 - rand(0, 40), vr: -2.2, life: 0.7, t: 0 });
      slices.push({ ...right, half: 'right', vx: 80 + rand(0, 40), vy: -100 - rand(0, 40), vr: 2.2, life: 0.7, t: 0 });
    }

    function maybeTriggerBoss() {
      if (combo >= nextBossAt && !bossActive) {
        generateQuestion(true);
        nextBossAt += 7;
        items = items.filter(i => i.alive && !i.isCorrect);
        createItem(currentQuestion.answer, true, { big: true });
        separateOverlaps();
      }
    }

    function handleCorrect(item) {
      item.alive = false;
      const bossBonus = currentQuestion.boss ? 18 : 0;
      score += 10 + Math.min(combo, 20) + bossBonus;
      combo += 1;
      shakeTime = 0.10;
      createSlicePieces(item);
      burst(item.x, item.y, true, currentQuestion.boss ? 24 : 14);
      showToast(currentQuestion.boss ? 'ボス撃破！' : '正解！', 'good', 520);
      soundCorrect();
      soundSlice();
      generateQuestion(false);
      maybeTriggerBoss();
      ensureOnlyOneCorrect(currentQuestion.answer);
      separateOverlaps();
      startBgmIfNeeded(currentQuestion && currentQuestion.boss ? 'boss' : 'normal');
      updateHud();
    }

    function handleWrong(item) {
      item.alive = false;
      combo = 0;
      lives -= 1;
      shakeTime = 0.14;
      burst(item.x, item.y, false, 10);
      showToast('ミス！', 'bad');
      soundWrong();
      updateHud();
      if (lives <= 0) endGame();
    }

    function openResult() {
      const rank = getRankByScore(score);
      resultScoreEl.textContent = `スコア ${score}`;
      resultRankEl.textContent = rank.name;
      resultAnim.rankIndex = rank.index;
      resultAnim.bounce = 0;
      resultAnim.spin = 0;
      resultAnim.sparkle = 0;
      resultAnim.pulse = 0;
      drawResultIllustration();
      gameOverOverlay.classList.remove('hidden');
    }

    function endGame() {
      gameState = 'over';
      stopBgm();
      pauseBtn.textContent = '一時停止';
      bossBannerEl.classList.remove('show');
      openResult();
    }

    function resetGame() {
      ensureAudio();
      score = 0; combo = 0; lives = mode === 'timeattack' ? 5 : 3; timeLeft = config.timeAttackDuration;
      items = []; particles = []; slices = []; spawnTimer = 0; difficultyTime = 0; bossActive = false; nextBossAt = 7; shakeTime = 0;
      generateQuestion(false);
      startBgmIfNeeded('normal');
      createItem(currentQuestion.answer, true);
      for (let i = 0; i < 3; i++) createItem(randomWrongAnswer(currentQuestion.answer), false);
      separateOverlaps();
      updateHud();
      gameOverOverlay.classList.add('hidden');
      startOverlay.classList.add('hidden');
      gameState = 'running';
      lastTs = performance.now();
    }

    function togglePause() {
      if (gameState === 'running') { gameState = 'paused'; pauseBtn.textContent = '再開'; }
      else if (gameState === 'paused') { gameState = 'running'; pauseBtn.textContent = '一時停止'; lastTs = performance.now(); startBgmIfNeeded(); }
    }

    function update(dt) {
      difficultyTime += dt;
      if (mode === 'timeattack') {
        timeLeft -= dt;
        if (timeLeft <= 0) { timeLeft = 0; updateHud(); endGame(); return; }
      }
      const interval = Math.max(config.minSpawnInterval, config.baseSpawnInterval - difficultyTime * 0.0018 - combo * 0.001);
      spawnTimer += dt;
      if (spawnTimer >= interval) { spawnTimer = 0; spawnWave(); }
      if (shakeTime > 0) shakeTime -= dt;

      for (const item of items) {
        if (!item.alive) continue;
        item.y += item.speed * dt;
        item.x += item.drift * dt;
        item.rotation += item.spin * dt;
        item.pulse += dt * 2.4;
        if (item.x < item.r) { item.x = item.r; item.drift *= -1; }
        else if (item.x > width - item.r) { item.x = width - item.r; item.drift *= -1; }
        if (item.y + item.r > playableBottom) {
          item.alive = false;
          if (item.isCorrect && gameState === 'running') {
            combo = 0; lives -= 1; shakeTime = 0.14; showToast('取り逃がし！', 'bad'); soundWrong();
            generateQuestion(false); ensureOnlyOneCorrect(currentQuestion.answer); separateOverlaps(); startBgmIfNeeded('normal'); updateHud();
            if (lives <= 0) { endGame(); return; }
          }
        }
      }

      items = items.filter(i => i.alive);
      separateOverlaps();
      for (const p of particles) { p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 220 * dt; }
      particles = particles.filter(p => p.t < p.life);
      for (const s of slices) { s.t += dt; s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 240 * dt; s.rotation += s.vr * dt; }
      slices = slices.filter(s => s.t < s.life);

      if (!items.some(i => i.alive && i.isCorrect)) {
        createItem(currentQuestion.answer, true, { big: currentQuestion.boss });
        ensureOnlyOneCorrect(currentQuestion.answer);
        separateOverlaps();
      }
      updateHud();
    }

    function drawForestBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, '#c8efff');
      sky.addColorStop(0.42, '#dff9e7');
      sky.addColorStop(1, '#9ed08e');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = 'rgba(255,255,255,.45)';
      ctx.beginPath(); ctx.arc(width * 0.18, 82, 34, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(width * 0.82, 110, 28, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#8cc47d';
      ctx.beginPath(); ctx.ellipse(width * 0.5, height * 0.34, width * 0.62, 62, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#6fae67';
      ctx.beginPath(); ctx.ellipse(width * 0.5, height * 0.45, width * 0.74, 86, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#4f8d50';
      ctx.beginPath(); ctx.ellipse(width * 0.5, height * 0.60, width * 0.88, 120, 0, 0, Math.PI * 2); ctx.fill();

      function drawTree(x, y, scale) {
        ctx.fillStyle = '#7b5432';
        ctx.fillRect(x - 6 * scale, y, 12 * scale, 58 * scale);
        ctx.fillStyle = '#3f7f40';
        ctx.beginPath(); ctx.arc(x, y, 28 * scale, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x - 20 * scale, y + 10 * scale, 22 * scale, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 20 * scale, y + 12 * scale, 22 * scale, 0, Math.PI * 2); ctx.fill();
      }

      drawTree(width * 0.12, height * 0.54, 1.0);
      drawTree(width * 0.28, height * 0.50, 1.15);
      drawTree(width * 0.76, height * 0.52, 1.1);
      drawTree(width * 0.90, height * 0.57, 0.95);

      const ground = ctx.createLinearGradient(0, playableTop, 0, height);
      ground.addColorStop(0, 'rgba(28,76,35,.12)');
      ground.addColorStop(0.2, 'rgba(24,66,31,.05)');
      ground.addColorStop(1, 'rgba(31,77,34,.18)');
      ctx.fillStyle = ground;
      ctx.fillRect(0, playableTop - 40, width, height - playableTop + 40);
    }

    function drawBackgroundGrid() {
      ctx.save();
      ctx.globalAlpha = 0.07;
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      const gap = 42;
      for (let x = 0; x <= width; x += gap) { ctx.beginPath(); ctx.moveTo(x, playableTop - 30); ctx.lineTo(x, playableBottom + 20); ctx.stroke(); }
      for (let y = playableTop - 30; y <= playableBottom + 20; y += gap) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
      ctx.restore();
    }

    function drawMaskedTopArea() {
      ctx.save();
      const shade = ctx.createLinearGradient(0, 0, 0, playableTop);
      shade.addColorStop(0, 'rgba(255,255,255,.16)');
      shade.addColorStop(1, 'rgba(255,255,255,.04)');
      ctx.fillStyle = shade;
      ctx.fillRect(0, 0, width, playableTop - 4);
      ctx.restore();
    }

    function drawBottomDangerZone() {
      const h = Math.min(90, height - playableBottom + 26);
      const y = playableBottom - 20;
      const grad = ctx.createLinearGradient(0, y, 0, y + h);
      grad.addColorStop(0, 'rgba(255, 120, 140, 0.0)');
      grad.addColorStop(1, 'rgba(255, 120, 140, 0.14)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, y, width, h);
    }

    function drawAppleLike(ctx2, r, stretch = 1) {
      ctx2.beginPath();
      ctx2.moveTo(0, -r * 0.92);
      ctx2.bezierCurveTo(r * 0.78, -r * 1.2, r * 1.1, -r * 0.1, r * 0.62, r * 0.7 * stretch);
      ctx2.bezierCurveTo(r * 0.3, r * 1.06 * stretch, -r * 0.3, r * 1.06 * stretch, -r * 0.62, r * 0.7 * stretch);
      ctx2.bezierCurveTo(-r * 1.1, -r * 0.1, -r * 0.78, -r * 1.2, 0, -r * 0.92);
      ctx2.closePath();
    }
    function drawPear(ctx2, r) {
      ctx2.beginPath();
      ctx2.moveTo(0, -r * 0.92);
      ctx2.bezierCurveTo(r * 0.68, -r * 0.92, r * 0.52, -r * 0.12, r * 0.76, r * 0.42);
      ctx2.bezierCurveTo(r * 0.92, r * 0.98, r * 0.3, r * 1.12, 0, r * 1.08);
      ctx2.bezierCurveTo(-r * 0.3, r * 1.12, -r * 0.92, r * 0.98, -r * 0.76, r * 0.42);
      ctx2.bezierCurveTo(-r * 0.52, -r * 0.12, -r * 0.68, -r * 0.92, 0, -r * 0.92);
      ctx2.closePath();
    }
    function drawLemon(ctx2, r) {
      ctx2.beginPath();
      ctx2.moveTo(0, -r * 0.92);
      ctx2.bezierCurveTo(r * 1.02, -r * 0.72, r * 1.02, r * 0.72, 0, r * 0.92);
      ctx2.bezierCurveTo(-r * 1.02, r * 0.72, -r * 1.02, -r * 0.72, 0, -r * 0.92);
      ctx2.closePath();
    }
    function traceFruitShape(item) {
      const { type } = item.theme;
      if (type === 'pear') drawPear(ctx, item.r);
      else if (type === 'lemon') drawLemon(ctx, item.r);
      else drawAppleLike(ctx, item.r, item.shapeSeed);
    }
    function drawLeafAndStem(item) {
      const r = item.r;
      ctx.save();
      ctx.lineCap = 'round';
      ctx.strokeStyle = item.theme.stem;
      ctx.lineWidth = Math.max(3, r * 0.08);
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.86);
      ctx.quadraticCurveTo(r * 0.05, -r * 1.12, r * 0.14, -r * 1.25);
      ctx.stroke();
      ctx.fillStyle = item.theme.leaf;
      ctx.beginPath();
      ctx.moveTo(r * 0.08, -r * 1.06);
      ctx.quadraticCurveTo(r * 0.6, -r * 1.22, r * 0.38, -r * 0.8);
      ctx.quadraticCurveTo(r * 0.18, -r * 0.72, r * 0.08, -r * 1.06);
      ctx.fill();
      ctx.restore();
    }
    function drawFruitCore(item, alpha = 1) {
      const { body1, body2 } = item.theme;
      const r = item.r * (1 + Math.sin(item.pulse || 0) * 0.018);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowBlur = 16;
      ctx.shadowColor = 'rgba(0,0,0,.24)';
      const temp = { ...item, r };
      traceFruitShape(temp);
      const grad = ctx.createLinearGradient(-r * 0.8, -r, r, r);
      grad.addColorStop(0, body1);
      grad.addColorStop(1, body2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.lineWidth = Math.max(2, r * 0.05);
      ctx.strokeStyle = 'rgba(255,255,255,.22)';
      ctx.stroke();
      ctx.save();
      ctx.globalAlpha *= 0.25;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.ellipse(-r * 0.22, -r * 0.28, r * 0.22, r * 0.12, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      drawLeafAndStem(temp);
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = Math.max(3, r * 0.09);
      ctx.strokeStyle = 'rgba(0,0,0,.22)';
      ctx.font = `900 ${Math.max(21, r * 0.86)}px 'Yomogi', sans-serif`;
      ctx.strokeText(String(item.value), 0, r * 0.05);
      ctx.fillText(String(item.value), 0, r * 0.05);
      ctx.restore();
    }
    function drawFruit(item) {
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.rotation);
      drawFruitCore(item, 1);
      ctx.restore();
    }
    function drawSlice(item) {
      const alpha = 1 - item.t / item.life;
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.rotation);
      ctx.beginPath();
      if (item.half === 'left') ctx.rect(-item.r * 1.2, -item.r * 1.4, item.r * 1.2, item.r * 2.8);
      else ctx.rect(0, -item.r * 1.4, item.r * 1.2, item.r * 2.8);
      ctx.clip();
      drawFruitCore(item, alpha);
      ctx.restore();
    }
    function drawParticles() {
      for (const p of particles) {
        const alpha = 1 - p.t / p.life;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.good ? 'rgba(88,227,148,1)' : 'rgba(255,122,136,1)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    function drawComboAura() {
      if (combo < 3) return;
      ctx.save();
      ctx.globalAlpha = Math.min(0.15, combo * 0.01);
      const radius = 40 + combo * 3;
      const grad = ctx.createRadialGradient(width / 2, playableTop - 14, 10, width / 2, playableTop - 14, radius);
      grad.addColorStop(0, 'rgba(255,255,255,.2)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(width / 2, playableTop - 14, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    function drawPausedLayer() {
      if (gameState !== 'paused') return;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.34)';
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '700 30px Yomogi, sans-serif';
      ctx.fillText('PAUSED', width / 2, height / 2);
      ctx.restore();
    }
    function drawTimeAttackFrame() {
      if (mode !== 'timeattack') return;
      ctx.save();
      ctx.globalAlpha = 0.14;
      ctx.strokeStyle = timeLeft <= 10 ? 'rgba(255,120,120,1)' : 'rgba(255,255,255,1)';
      ctx.lineWidth = 5;
      ctx.strokeRect(3, playableTop - 6, width - 6, playableBottom - playableTop + 12);
      ctx.restore();
    }

    function drawResultIllustration() {
      const rank = ranks[resultAnim.rankIndex];
      const w = resultCanvas.width;
      const h = resultCanvas.height;
      rctx.clearRect(0, 0, w, h);

      const bg = rctx.createLinearGradient(0, 0, 0, h);
      bg.addColorStop(0, '#fff8ef');
      bg.addColorStop(1, '#e9fff0');
      rctx.fillStyle = bg;
      rctx.fillRect(0, 0, w, h);

      rctx.save();
      rctx.translate(w / 2, h / 2 + Math.sin(resultAnim.pulse) * 3 - resultAnim.bounce * 12);
      rctx.rotate(resultAnim.spin);

      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI * 2 / 6) * i + resultAnim.sparkle;
        const sx = Math.cos(angle) * 56;
        const sy = Math.sin(angle) * 56;
        rctx.fillStyle = 'rgba(255,220,120,.85)';
        rctx.beginPath();
        rctx.arc(sx, sy, 4 + Math.sin(resultAnim.sparkle + i) * 1.2, 0, Math.PI * 2);
        rctx.fill();
      }

      switch (rank.art) {
        case 'sprout': drawSprout(); break;
        case 'seedbag': drawSeedBag(); break;
        case 'chick': drawChick(); break;
        case 'basket': drawBasket(); break;
        case 'applecat': drawAppleCat(); break;
        case 'bear': drawBear(); break;
        case 'tree': drawTreeSpirit(); break;
        case 'cake': drawCake(); break;
        case 'crownfruit': drawCrownFruit(); break;
        case 'king': drawKing(); break;
      }

      rctx.restore();

      function drawEyes(y = -4, spread = 14) {
        rctx.fillStyle = '#3a2a2a';
        rctx.beginPath(); rctx.arc(-spread, y, 3, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(spread, y, 3, 0, Math.PI * 2); rctx.fill();
        rctx.strokeStyle = '#3a2a2a';
        rctx.lineWidth = 2;
        rctx.beginPath(); rctx.arc(0, y + 6, 7, 0.15, Math.PI - 0.15); rctx.stroke();
      }

      function drawSprout() {
        rctx.fillStyle = '#8b5b3b';
        rctx.beginPath(); rctx.ellipse(0, 28, 34, 22, 0, 0, Math.PI * 2); rctx.fill();
        rctx.fillStyle = '#6abf66';
        rctx.fillRect(-4, -4, 8, 36);
        rctx.beginPath(); rctx.ellipse(-16, -10, 18, 11, -0.55, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.ellipse(16, -12, 18, 11, 0.55, 0, Math.PI * 2); rctx.fill();
        drawEyes(10, 10);
      }

      function drawSeedBag() {
        rctx.fillStyle = '#d9b06d';
        rctx.beginPath(); rctx.roundRect(-34, -34, 68, 82, 16); rctx.fill();
        rctx.fillStyle = '#af8551';
        rctx.fillRect(-28, -24, 56, 10);
        rctx.fillStyle = '#6abf66';
        rctx.beginPath(); rctx.ellipse(0, 2, 18, 12, 0, 0, Math.PI * 2); rctx.fill();
        drawEyes(18, 12);
      }

      function drawChick() {
        rctx.fillStyle = '#ffe16d';
        rctx.beginPath(); rctx.arc(0, 8, 34, 0, Math.PI * 2); rctx.fill();
        rctx.fillStyle = '#ffb14c';
        rctx.beginPath(); rctx.moveTo(0, 8); rctx.lineTo(-10, 18); rctx.lineTo(10, 18); rctx.closePath(); rctx.fill();
        rctx.fillStyle = '#fff';
        rctx.beginPath(); rctx.arc(-12, -4, 6, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(12, -4, 6, 0, Math.PI * 2); rctx.fill();
        rctx.fillStyle = '#2f1b1b';
        rctx.beginPath(); rctx.arc(-12, -4, 2.5, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(12, -4, 2.5, 0, Math.PI * 2); rctx.fill();
      }

      function drawBasket() {
        rctx.fillStyle = '#b8763d';
        rctx.beginPath(); rctx.roundRect(-38, -4, 76, 50, 16); rctx.fill();
        rctx.strokeStyle = '#8d5528';
        rctx.lineWidth = 6;
        rctx.beginPath(); rctx.arc(0, -2, 28, Math.PI, 0); rctx.stroke();
        drawSmallFruit(-16, -10, '#ff7b7b');
        drawSmallFruit(0, -18, '#ffd55e');
        drawSmallFruit(16, -10, '#7bcf67');
      }

      function drawAppleCat() {
        rctx.fillStyle = '#ff7a83';
        rctx.beginPath(); rctx.arc(0, 10, 34, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.moveTo(-20, -14); rctx.lineTo(-6, -42); rctx.lineTo(0, -14); rctx.closePath(); rctx.fill();
        rctx.beginPath(); rctx.moveTo(20, -14); rctx.lineTo(6, -42); rctx.lineTo(0, -14); rctx.closePath(); rctx.fill();
        drawEyes(6, 12);
        rctx.strokeStyle = '#fff'; rctx.lineWidth = 2;
        rctx.beginPath(); rctx.moveTo(-28, 10); rctx.lineTo(-44, 6); rctx.stroke();
        rctx.beginPath(); rctx.moveTo(-28, 16); rctx.lineTo(-44, 18); rctx.stroke();
        rctx.beginPath(); rctx.moveTo(28, 10); rctx.lineTo(44, 6); rctx.stroke();
        rctx.beginPath(); rctx.moveTo(28, 16); rctx.lineTo(44, 18); rctx.stroke();
        rctx.fillStyle = '#58b95b';
        rctx.beginPath(); rctx.ellipse(12, -32, 10, 7, 0.4, 0, Math.PI * 2); rctx.fill();
      }

      function drawBear() {
        rctx.fillStyle = '#b98a61';
        rctx.beginPath(); rctx.arc(0, 8, 34, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(-24, -18, 12, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(24, -18, 12, 0, Math.PI * 2); rctx.fill();
        rctx.fillStyle = '#efd0b8';
        rctx.beginPath(); rctx.ellipse(0, 18, 20, 14, 0, 0, Math.PI * 2); rctx.fill();
        drawEyes(2, 12);
      }

      function drawTreeSpirit() {
        rctx.fillStyle = '#6f4c2d';
        rctx.fillRect(-12, 6, 24, 58);
        rctx.fillStyle = '#59a95a';
        rctx.beginPath(); rctx.arc(0, -4, 34, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(-22, 10, 26, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(22, 10, 26, 0, Math.PI * 2); rctx.fill();
        drawEyes(4, 12);
      }

      function drawCake() {
        rctx.fillStyle = '#ffe0ef';
        rctx.beginPath(); rctx.roundRect(-34, -6, 68, 54, 12); rctx.fill();
        rctx.fillStyle = '#ff9fc1';
        rctx.fillRect(-34, -6, 68, 18);
        rctx.fillStyle = '#fff3b2';
        rctx.fillRect(-34, 12, 68, 16);
        rctx.fillStyle = '#ff7fa4';
        rctx.beginPath(); rctx.arc(0, -18, 12, 0, Math.PI * 2); rctx.fill();
        drawEyes(20, 12);
      }

      function drawCrownFruit() {
        rctx.fillStyle = '#8bc6ff';
        rctx.beginPath(); rctx.arc(0, 10, 34, 0, Math.PI * 2); rctx.fill();
        drawEyes(6, 12);
        rctx.fillStyle = '#ffd85f';
        rctx.beginPath();
        rctx.moveTo(-24, -20); rctx.lineTo(-12, -42); rctx.lineTo(0, -22); rctx.lineTo(12, -42); rctx.lineTo(24, -20); rctx.closePath();
        rctx.fill();
        drawSmallFruit(-10, -3, '#ff8b8b', 6);
        drawSmallFruit(10, 2, '#8ce078', 6);
      }

      function drawKing() {
        rctx.fillStyle = '#ffd86c';
        rctx.beginPath(); rctx.arc(0, 12, 36, 0, Math.PI * 2); rctx.fill();
        drawEyes(6, 13);
        rctx.fillStyle = '#fff';
        rctx.beginPath(); rctx.arc(-12, -2, 5, 0, Math.PI * 2); rctx.fill();
        rctx.beginPath(); rctx.arc(12, -2, 5, 0, Math.PI * 2); rctx.fill();
        rctx.fillStyle = '#ffd45c';
        rctx.beginPath();
        rctx.moveTo(-28, -24); rctx.lineTo(-18, -48); rctx.lineTo(-4, -26); rctx.lineTo(0, -50); rctx.lineTo(8, -26); rctx.lineTo(22, -48); rctx.lineTo(30, -24); rctx.closePath();
        rctx.fill();
        rctx.fillStyle = '#ff8b8b';
        rctx.beginPath(); rctx.arc(0, -34, 5, 0, Math.PI * 2); rctx.fill();
      }

      function drawSmallFruit(x, y, color, r = 8) {
        rctx.fillStyle = color;
        rctx.beginPath(); rctx.arc(x, y, r, 0, Math.PI * 2); rctx.fill();
      }
    }

    function updateResultAnimation(dt) {
      if (gameOverOverlay.classList.contains('hidden')) return;
      resultAnim.pulse += dt * 4;
      resultAnim.sparkle += dt * 2.2;
      resultAnim.bounce = Math.max(0, resultAnim.bounce - dt * 2.6);
      resultAnim.spin *= 0.92;
      drawResultIllustration();
    }

    function triggerResultAction() {
      resultAnim.bounce = 1;
      resultAnim.spin += 0.18;
      resultAnim.sparkle += 0.8;
      soundResultTap();
      drawResultIllustration();
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      let ox = 0, oy = 0;
      if (shakeTime > 0) { ox = rand(-5, 5) * shakeTime * 6; oy = rand(-4, 4) * shakeTime * 6; }
      ctx.save();
      ctx.translate(ox, oy);
      drawForestBackground();
      drawMaskedTopArea();
      drawBackgroundGrid();
      drawBottomDangerZone();
      drawComboAura();
      for (const item of items) drawFruit(item);
      for (const s of slices) drawSlice(s);
      drawParticles();
      drawTimeAttackFrame();
      ctx.restore();
      drawPausedLayer();
    }

    function handlePointer(e) {
      if (gameState !== 'running') return;
      ensureAudio();
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches && e.touches[0] ? e.touches[0].clientY : e.clientY;
      const p = { x: clientX - rect.left, y: clientY - rect.top };
      if (p.y < playableTop - 4 || p.y > playableBottom + 8) return;
      let tapped = null;
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        const dx = p.x - item.x;
        const dy = p.y - item.y;
        if (dx * dx + dy * dy <= item.r * item.r * 1.08) { tapped = item; break; }
      }
      if (!tapped) return;
      if (tapped.value === currentQuestion.answer) handleCorrect(tapped);
      else handleWrong(tapped);
    }

    canvas.addEventListener('pointerdown', handlePointer, { passive: true });
    resultIllustWrap.addEventListener('pointerdown', () => {
      if (!gameOverOverlay.classList.contains('hidden')) triggerResultAction();
    });
    startBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('click', resetGame);
    pauseBtn.addEventListener('click', () => { if (gameState !== 'ready' && gameState !== 'over') togglePause(); });
    modeCards.forEach(card => card.addEventListener('click', () => setMode(card.dataset.mode)));

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    window.visualViewport?.addEventListener('resize', resize);

    resize();
    updateHud();
    setMode('endless');
    generateQuestion(false);
    drawResultIllustration();
    requestAnimationFrame((ts) => {
      lastTs = ts;
      requestAnimationFrame(function loop(ts2) {
        const dt = clamp((ts2 - lastTs) / 1000, 0, 0.033);
        lastTs = ts2;
        if (gameState === 'running') update(dt);
        updateResultAnimation(dt);
        draw();
        requestAnimationFrame(loop);
      });
    });
  </script>
</body>
</html>
